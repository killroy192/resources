  <circle class="badge" cx="732" cy="92" r="12"/>
  <text class="find-n" x="728" y="97">3</text>
  <text class="find-h" x="752" y="97">No Required Hard Sonar Gate on PR</text>
  <text class="find-b" x="724" y="118">Branch policies = none. Human review only.</text>
  <text class="find-b" x="724" y="132">Sonar does NOT run in /deploy 440/441/472.</text>
  <text class="find-b" x="724" y="146">Win = UC-4 Hard Sonar gate: Sonar + lint + &gt;=90%.</text>
  <text class="find-b" x="724" y="160">That is ONE use case (UC-4), not two Sonars.</text>
  <text class="metric" x="724" y="178">Attacks with UC-4 Hard Sonar gate</text>

