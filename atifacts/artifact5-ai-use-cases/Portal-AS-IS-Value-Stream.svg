  <text class="sub" x="28" y="54">LBMH.Services.Portal | physical feedback path of one change | metrics 2026-06-16 to 2026-07-16 (~30d, adequacy 93) | lock: svg = md = SDLC.json | pulled 2026-07-16</text>
  <text class="legend" x="1200" y="34">Legend: A Automatic   M Manual</text>
  <text class="legend" x="1200" y="52">Yellow cards = Findings (5) coded on diagram</text>

  <!-- ========== FINDING 1 (top-left) ========== -->
  <rect class="find" x="28" y="72" width="320" height="118" rx="4"/>
  <circle class="badge" cx="48" cy="92" r="12"/>
  <text class="find-n" x="44" y="97">1</text>
  <text class="find-h" x="68" y="97">Don&apos;t Skip the Written Spec</text>
  <text class="find-b" x="40" y="118">Preferred: Spec -&gt; Jira -&gt; Code. Class/386 Jira -&gt; Spec also OK.</text>
  <text class="find-b" x="40" y="132">Real risk = skipping the written spec (gaps hit the PR).</text>
  <text class="find-b" x="40" y="146">Risk = skip written spec, not the order.</text>
  <text class="find-b" x="40" y="160">Gaps (/api/, mocks, schema) then hit PR.</text>
  <text class="metric" x="40" y="178">Attacks with UC-1</text>

  <!-- ========== FINDING 2 (top-center) ========== -->
