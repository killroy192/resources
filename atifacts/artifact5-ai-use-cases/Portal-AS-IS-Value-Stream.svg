  <circle class="badge" cx="390" cy="92" r="12"/>
  <text class="find-n" x="386" y="97">2</text>
  <text class="find-h" x="410" y="97">Human Review ~2.8h (Pretty Good)</text>
  <text class="find-b" x="382" y="118">Non-instant PRs: median open ~2.8h (n=8) =</text>
  <text class="find-b" x="382" y="132">person code review wait. That is pretty good.</text>
  <text class="find-b" x="382" y="146">All-PR ~63s = owner-merge skew, not SLA.</text>
  <text class="find-b" x="382" y="160">Optional: Lore + /pre-pr-review before Ready.</text>
  <text class="metric" x="382" y="178">Attacks with UC-2</text>

  <!-- ========== FINDING 3 (top-right) ========== -->
